<html>

<head>
    <title>My World</title>
    <style>
        /* General Body */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #fafafa;
            color: #262626;
            text-align: center;
        }

        /* Navbar */
        nav {
            background: white;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        nav a {
            color: #262626;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #0095f6;
        }

        /* Header */
        header {
            padding: 50px 20px;
        }

        header h1 {
            color: #0095f6;
            font-size: 36px;
        }

        header p {
            color: #262626;
            font-size: 18px;
            margin: 10px 0 20px 0;
        }

        header img {
            border-radius: 50%;
            width: 150px;
            margin: 10px;
            border: 3px solid #0095f6;
        }

        /* Section cards */
        section {
            background: white;
            margin: 20px auto;
            padding: 20px;
            max-width: 600px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        section:hover {
            transform: scale(1.03);
        }

        section h2 {
            color: #0095f6;
            margin-bottom: 10px;
        }

        section p {
            color: #262626;
        }

        /* Buttons */
        .animate {
            padding: 10px 20px;
            background: #0095f6;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s, background 0.3s;
        }

        .animate:hover {
            background: #0073cc;
            transform: scale(1.1);
        }

        /* Footer links if needed */
        a {
            color: #0095f6;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>
