<!DOCTYPE html>
<html>
<head>
    <title>About Me</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #fafafa;
            color: #262626;
            text-align: center;
        }

        /* Navbar */
        nav {
            background: white;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        nav a {
            color: #262626;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #0095f6;
        }

        /* Header */
        header {
            padding: 50px 20px;
        }

        header h1 {
            color: #0095f6;
            font-size: 36px;
            margin-bottom: 10px;
        }

        header p {
            color: #262626;
            font-size: 18px;
            margin-bottom: 20px;
        }

        /* Section cards */
        section {
            background: white;
            margin: 20px auto;
            padding: 20px;
            max-width: 600px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        section:hover {
            transform: scale(1.03);
        }

        section h2 {
            color: #0095f6;
            margin-bottom: 10px;
        }

        section p {
            color: #262626;
        }

        /* Buttons */
        .animate {
            padding: 10px 20px;
            background: #0095f6;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s, background 0.3s;
        }

        .animate:hover {
            background: #0073cc;
            transform: scale(1.1);
        }

        /* Links */
        a {
            color: #0095f6;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>

<!-- Navbar -->
<nav>
    <a href="index.html">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<!-- Header -->
<header>
    <h1>About Me 👤</h1>
    <p>Hi, I am SR. I am building my own website step by step.</p>
</header>

<!-- About Section Card -->
<section>
    <h2>My Goals</h2>
    <p>Learn new things, improve my skills over time, and create my own projects 🚀.</p>
</section>

<!-- Back button -->
<a href="index.html" class="animate">⬅ Back to Home</a>

</body>
</html>
