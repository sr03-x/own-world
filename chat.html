<!DOCTYPE html>
<html>

<head>
    <title>Chat App</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #ece5dd;
        }

        header {
            background: #075e54;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
        }

        .chat-box {
            height: 75vh;
            padding: 10px;
            overflow-y: auto;
        }

        .message {
            background: white;
            padding: 10px 15px;
            margin: 10px;
            border-radius: 10px;
            width: fit-content;
            max-width: 70%;
        }

        .sent {
            background: #dcf8c6;
            margin-left: auto;
        }

        .input-area {
            display: flex;
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            border-top: 1px solid #ccc;
        }

        input {
            flex: 1;
            padding: 15px;
            border: none;
            outline: none;
        }

        button {
            background: #25d366;
            border: none;
            padding: 15px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

<header>
    Chat App 💬
</header>

<div class="chat-box" id="chatBox"></div>

<div class="input-area">
    <input type="text" id="msg" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
function sendMessage() {
    let input = document.getElementById("msg");
    let chatBox = document.getElementById("chatBox");

    if(input.value !== "") {
        let div = document.createElement("div");
        div.className = "message sent";
        div.innerText = input.value;

        chatBox.appendChild(div);
        input.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;
    }
}
</script>

</body>
</html>
