<!DOCTYPE html>
<html>

<head>
    <title>Chat App</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #ece5dd;
        }

        header {
            background: #075e54;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
        }

        #chatBox {
            height: 75vh;
            padding: 10px;
            overflow-y: auto;
        }

        .message {
            padding: 10px 15px;
            margin: 10px;
            border-radius: 10px;
            width: fit-content;
            max-width: 70%;
            position: relative;
            font-size: 14px;
        }

        .sent {
            background: #dcf8c6;
            margin-left: auto;
        }

        .time {
            font-size: 10px;
            color: gray;
            text-align: right;
            margin-top: 3px;
        }

        .input-area {
            display: flex;
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            border-top: 1px solid #ccc;
        }

        input {
            flex: 1;
            padding: 15px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        button {
            background: #25d366;
            border: none;
            padding: 15px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>

<body>

<header>Chat App 💬</header>

<div id="chatBox"></div>

<div class="input-area">
    <input type="text" id="msg" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
function sendMessage() {
    let input = document.getElementById("msg");
    let chatBox = document.getElementById("chatBox");
    let text = input.value.trim();

    if (text === "") return;

    // create message
    let div = document.createElement("div");
    div.className = "message sent";

    // message text
    let msgText = document.createElement("div");
    msgText.innerText = text;

    // time
    let time = document.createElement("div");
    time.className = "time";

    let now = new Date();
    let hours = now.getHours();
    let minutes = now.getMinutes().toString().padStart(2, '0');

    time.innerText = hours + ":" + minutes;

    // append
    div.appendChild(msgText);
    div.appendChild(time);

    chatBox.appendChild(div);

    input.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;
}

// Enter key support
document.getElementById("msg").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
